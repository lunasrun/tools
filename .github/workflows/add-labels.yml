name: Label PRs

on:
  pull_request:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest

    steps:
      - name: Determine label and apply
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          case "$BRANCH_NAME" in
            fix/*)
              LABEL="fix"
              ;;
            feat/*|feature/*)
              LABEL="feature"
              ;;
            refactor/*)
              LABEL="refactor"
              ;;
            version/*)
              LABEL="version"
              ;;
            chore/*)
              LABEL="chore"
              ;;
            docs/*)
              LABEL="documentation"
              ;;
            *)
              LABEL=""
              ;;
          esac

          if [[ -n "$LABEL" ]]; then
            # Self-healing: if the label doesn't exist yet, create it and retry
            # so a missing label never fails the workflow.
            if ! gh pr edit "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --add-label "$LABEL"; then
              echo "Label '$LABEL' missing; creating it and retrying."
              gh label create "$LABEL" --repo "$GITHUB_REPOSITORY" --force >/dev/null 2>&1 || true
              gh pr edit "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --add-label "$LABEL" || true
            fi
          fi
